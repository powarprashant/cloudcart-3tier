apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudcart-frontend
  namespace: cloudcart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudcart-frontend
  template:
    metadata:
      labels:
        app: cloudcart-frontend
    spec:
      containers:
        - name: frontend
          image: cloudcart-frontend:latest
          ports:
            - containerPort: 80