apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudcart-backend
  namespace: cloudcart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudcart-backend
  template:
    metadata:
      labels:
        app: cloudcart-backend
    spec:
      containers:
        - name: backend
          image: cloudcart-backend:latest
          ports:
            - containerPort: 5000
          